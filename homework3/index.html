<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>

        <div class="top-container">
            <section class="to-do-container">
                <div class="to-do">
                    <input id="task-input" type="text" placeholder="your task" />
                    <ul id="tasklist"></ul>
                </div>
            </section>

            <section class="filter-container">
                <div class="filter">
                    <div class="filter-element"></div>
                    <div class="filter-text-container">
                        <p class="filter-text">
                            <button class="filter-select active" id="oldest-first"></button>oldest first<br />
                            <button class="filter-select" id="newest-first"></button>newest first<br />
                        </p>
                    </div>

                    <div class="filter-element" style="margin-top: 40px; text-align: center; align-content: center;">
                        <p style="font-family: Verdana; font-size: 14px; color: #624598;">sorry I'm very tired :(</p>
                    </div>

                    <div class="filter-text-container">
                        <p class="filter-text">
                            <button class="filter-select" id="completed-only"></button>completed only<br />
                            <button class="filter-select" id="incomplete-only"></button>incomplete only<br />
                            <button class="filter-select" id="high-priority-only"></button>high priority only<br />
                        </p>
                    </div>

                </div>
            </section>
        </div>
        
        <div class="bottom-container">
            <button class="edit">delete all</button>

            <input id="search-input" type="text" placeholder="find the task" />
        </div>

    </main>

    <script src="index.js"></script>
</body>
</html>
